# ============================================================
# /etc/nginx/conf.d/00-upstreams.conf
# ============================================================

upstream vless_xhttp_backend {
    # 修复: max_fails=3 → max_fails=0，与全局 proxy_next_upstream off 语义一致
    # proxy_next_upstream off 时失败不重试，max_fails 熔断永远不会触发，明确禁用
    server 127.0.0.1:8001 max_fails=0 fail_timeout=30s;
    keepalive          256;
    keepalive_requests 10000;
    keepalive_timeout  300s;    # 修复: 7200s → 300s（原注释说已改，实际值未改，现在真正修复）
}

upstream vless_grpc_backend {
    # 修复: max_fails=3 → max_fails=0，同上
    server 127.0.0.1:8002 max_fails=0 fail_timeout=30s;
    keepalive          220;
    keepalive_requests 65000;
    keepalive_timeout  180s;
}