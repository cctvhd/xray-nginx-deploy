# ===================================================================
# /etc/nginx/conf.d/servers.conf
# ===================================================================

# ===================================================================
# CDN ca.ccpv.tk — xhttp
# ===================================================================
server {
    listen 127.0.0.1:20443 ssl proxy_protocol;
    http2  on;
    server_name ca.ccpv.tk;

    gzip            on;
    gzip_vary       on;
    gzip_comp_level 2;
    gzip_min_length 1000;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;

    ssl_certificate     /etc/letsencrypt/live/ccpv.tk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ccpv.tk/privkey.pem;

    access_log /var/log/nginx/ca.ccpv.tk.log    main buffer=32k flush=5m;
    error_log  /var/log/nginx/ca.ccpv.tk.err.log warn;

    resolver 127.0.0.1 valid=300s;
    resolver_timeout 5s;
    server_tokens off;

    if ($from_cf = 0) {
        rewrite ^ /_fake last;
    }

    # ==================== xhttp 代理 ====================
    location /98eb0d08b5574ea7b4a3f8e302064540 {
        gzip       off;
        access_log off;
        limit_req  zone=websocket burst=100 nodelay;
        limit_conn conn_limit 200;

        proxy_pass          http://vless_xhttp_backend;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
        proxy_set_header    Host             $host;
        proxy_set_header    X-Real-IP        $final_real_ip;
        proxy_set_header    X-Forwarded-For  $final_real_ip;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Cache-Control    "no-cache, no-store, private";

        add_header X-Accel-Buffering "no" always;
        proxy_hide_header Via;
        proxy_hide_header X-Cache;
        proxy_hide_header X-Cache-Status;

        # 修复: CORS 从 common.conf 全局移至此处，只有 xhttp location 需要
        add_header Access-Control-Allow-Origin  "*"                    always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"   always;
        add_header Access-Control-Allow-Headers "*"                    always;

        proxy_connect_timeout     15s;
        proxy_send_timeout        7200s;
        proxy_read_timeout        7200s;
        proxy_buffering           off;
        proxy_request_buffering   off;
        chunked_transfer_encoding on;
        proxy_cache               off;
        proxy_socket_keepalive    on;
        proxy_redirect            off;
        proxy_next_upstream         off;
        proxy_next_upstream_timeout 0;
        proxy_next_upstream_tries   0;

        client_max_body_size  0;
        client_body_timeout   7200s;  # 显式覆盖全局 60s，xhttp 长连接必须
        send_timeout          7200s;
        keepalive_timeout     7200s;
        keepalive_requests    5000;
    }

    location = /health {
        limit_req  zone=health burst=5 nodelay;
        access_log off;
        add_header Content-Type  "text/plain"                       always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 200 "healthy\n";
    }

    location /_fake {
        internal;
        root      /var/www/html;
        index     index.html;
        try_files /index.html =200;
        # 修复: CSP 从 common.conf 全局移至伪装页 location，代理 location 不应带 CSP
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;
        add_header Cache-Control "public, max-age=3600" always;
        access_log off;
    }

    location / {
        root  /var/www/html;
        index index.html;
        # 修复: CSP 只在伪装页加
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires    30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }
        try_files $uri $uri/ /index.html;
    }
}

# ===================================================================
# CDN la.shoes-bv.tk — gRPC
# ===================================================================
server {
    listen 127.0.0.1:20445 ssl proxy_protocol;
    http2  on;
    server_name la.shoes-bv.tk;

    ssl_certificate     /etc/letsencrypt/live/shoes-bv.tk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shoes-bv.tk/privkey.pem;

    access_log /var/log/nginx/la.shoes-bv.tk.log    main buffer=32k flush=5m;
    error_log  /var/log/nginx/la.shoes-bv.tk.err.log warn;

    server_tokens off;
    resolver 127.0.0.1 valid=300s;
    resolver_timeout 5s;

    gzip            on;
    gzip_vary       on;
    gzip_comp_level 2;
    gzip_min_length 1000;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;

    if ($from_cf = 0) {
        rewrite ^ /_fake last;
    }

    # ==================== gRPC Location ====================
    location /grpc.Service {
        if ($content_type !~ "application/grpc") {
            return 404;
        }
        access_log off;
        gzip       off;
        limit_req  zone=websocket burst=100 nodelay;
        limit_conn conn_limit 200;

        grpc_pass             grpc://vless_grpc_backend;
        grpc_socket_keepalive on;
        grpc_connect_timeout  15s;
        grpc_send_timeout     300s;   # 修复: 180s → 300s，与 fallback.conf 统一，同一 backend 行为一致
        grpc_read_timeout     300s;   # 修复: 180s → 300s
        grpc_buffer_size      64k;
        grpc_next_upstream    off;
        grpc_set_header Host              $host;
        grpc_set_header X-Real-IP         $final_real_ip;
        grpc_set_header X-Forwarded-For   $final_real_ip;
        grpc_set_header X-Forwarded-Proto $scheme;
        grpc_set_header Te                "trailers";

        client_max_body_size 0;
        client_body_timeout  300s;
        send_timeout         300s;
    }

    location = /health {
        limit_req  zone=health burst=5 nodelay;
        access_log off;
        add_header Content-Type  "text/plain"                       always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 200 "healthy\n";
    }

    location /_fake {
        internal;
        root      /var/www/la.shoes-bv.tk;
        try_files /index.html =200;
        # 修复: CSP 移至伪装页 location
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;
        add_header Cache-Control "public, max-age=3600" always;
        access_log off;
    }

    location / {
        root  /var/www/la.shoes-bv.tk;
        index index.html;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires    30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }
        try_files $uri $uri/ /index.html;
    }
}

# ===================================================================
# 兜底：SNI 不匹配拒绝握手
# ===================================================================
server {
    listen 127.0.0.1:20443 ssl default_server proxy_protocol;
    ssl_reject_handshake on;
}

server {
    listen 127.0.0.1:20445 ssl default_server proxy_protocol;
    ssl_reject_handshake on;
}

# ===================================================================
# SNI 陷阱兜底伪装站
# ===================================================================
server {
    listen 127.0.0.1:20880 proxy_protocol;
    server_name   _;
    server_tokens off;
    access_log    off;

    # 修复: 补全超时保护，防止扫描器触发后连接长期挂起
    client_header_timeout 10s;
    send_timeout          10s;
    keepalive_timeout     10s;

    gzip            on;
    gzip_vary       on;
    gzip_comp_level 2;
    gzip_min_length 1000;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;

    root  /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control          "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff"              always;
        # 修复: 伪装站加 CSP，与伪装身份一致
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;
    }
}

# ===================================================================
# HTTP → HTTPS 重定向 & ACME 验证
# ===================================================================
server {
    listen 80;
    listen [::]:80;
    server_name ca.ccpv.tk la.shoes-bv.tk lax.shoes-bv.tk la.ccpv.tk;

    location ^~ /.well-known/acme-challenge/ {
        root          /var/www/html;
        try_files     $uri =404;
        access_log    off;
        log_not_found off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}