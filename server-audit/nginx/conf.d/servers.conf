
# ===================================================================
# CDN dn.zhongning.tk — xhttp
# P1修复：location 路径与 xray xhttpSettings.path 保持一致
# ===================================================================
server {
    listen 127.0.0.1:20443 ssl proxy_protocol;
    http2  on;
    server_name dn.zhongning.tk;
    gzip   on;
    gzip_vary       on;
    gzip_comp_level 2;
    gzip_min_length 1000;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;

    ssl_certificate     /etc/letsencrypt/live/zhongning.tk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zhongning.tk/privkey.pem;

    access_log /var/log/nginx/dn.zhongning.tk.log    main buffer=32k flush=5m;
    error_log  /var/log/nginx/dn.zhongning.tk.err.log warn;

    resolver 127.0.0.1 valid=300s;
    resolver_timeout 5s;
    server_tokens off;

    if ($from_cf = 0) {
        rewrite ^ /_fake last;
    }

    # P1修复：路径与 xray xhttpSettings.path 保持一致
    location /c028cb9083544ea3ae6d62fc505c5251 {
        gzip       off;
        access_log off;
        limit_req  zone=websocket burst=100 nodelay;
        limit_conn conn_limit 200;

        proxy_pass              http://vless_xhttp_backend;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $final_real_ip;
        proxy_set_header        X-Forwarded-For $final_real_ip;
        proxy_set_header        X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

 add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
 add_header X-Content-Type-Options nosniff always;
 add_header X-Frame-Options DENY always;
 add_header Referrer-Policy "strict-origin-when-cross-origin" always;
 add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header X-Accel-Buffering "no" always;
 add_header Access-Control-Allow-Origin "*" always;
 add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
 add_header Access-Control-Allow-Headers "*" always;
        proxy_hide_header Via;
        proxy_hide_header X-Cache;
        proxy_hide_header X-Cache-Status;

        proxy_connect_timeout       15s;
        proxy_send_timeout          7200s;
        proxy_read_timeout          7200s;
        proxy_buffering             off;
        proxy_request_buffering     off;
        chunked_transfer_encoding   on;
        proxy_cache                 off;
        proxy_socket_keepalive      on;
        proxy_redirect              off;
        proxy_next_upstream         off;
        proxy_next_upstream_timeout 0;
        proxy_next_upstream_tries   0;
        client_max_body_size        0;
        client_body_timeout         7200s;
        send_timeout                7200s;
        # P5修复：长连接在 location 内单独覆盖
        keepalive_timeout           7200s;
        keepalive_requests          5000;
    }

    location = /health {
        limit_req  zone=health burst=5 nodelay;
        access_log off;
 add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
 add_header X-Content-Type-Options nosniff always;
 add_header X-Frame-Options DENY always;
 add_header Referrer-Policy "strict-origin-when-cross-origin" always;
 add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Content-Type  "text/plain" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 200 "healthy\n";
    }

    location /_fake {
        internal;
        root      /var/www/html;
        index     index.html;
        try_files /index.html =200;
 add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
 add_header X-Content-Type-Options nosniff always;
 add_header X-Frame-Options DENY always;
 add_header Referrer-Policy "strict-origin-when-cross-origin" always;
 add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Cache-Control "public, max-age=3600" always;
 add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;
        access_log off;
    }

    location / {
        root  /var/www/html;
        index index.html;
 add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
 add_header X-Content-Type-Options nosniff always;
 add_header X-Frame-Options DENY always;
 add_header Referrer-Policy "strict-origin-when-cross-origin" always;
 add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
 add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires    30d;
 add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
 add_header X-Content-Type-Options nosniff always;
 add_header X-Frame-Options DENY always;
 add_header Referrer-Policy "strict-origin-when-cross-origin" always;
 add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }
        try_files $uri $uri/ /index.html;
    }
}

# ===================================================================
# CDN la.zhongning.cf — gRPC
# ===================================================================
server {
    listen 127.0.0.1:20445 ssl proxy_protocol;
    http2  on;
    server_name la.zhongning.cf;
    gzip   on;
    gzip_vary       on;
    gzip_comp_level 2;
    gzip_min_length 1000;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;

    ssl_certificate     /etc/letsencrypt/live/zhongning.cf/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zhongning.cf/privkey.pem;

    access_log /var/log/nginx/la.zhongning.cf.log    main buffer=32k flush=5m;
    error_log  /var/log/nginx/la.zhongning.cf.err.log warn;

    resolver 127.0.0.1 valid=300s;
    resolver_timeout 5s;
    server_tokens off;

    if ($from_cf = 0) {
        rewrite ^ /_fake last;
    }

    location /grpc.Service {
        gzip       off;
        access_log off;
        limit_req  zone=websocket burst=100 nodelay;
        limit_conn conn_limit 200;

        grpc_pass             grpc://vless_grpc_backend;
        grpc_set_header       Host $host;
        grpc_set_header       X-Real-IP $final_real_ip;
        grpc_set_header       X-Forwarded-For $final_real_ip;
        grpc_set_header       X-Forwarded-Proto $scheme;
        grpc_set_header       Te "trailers";
        grpc_set_header       Content-Type "application/grpc";

        grpc_connect_timeout  15s;
        grpc_send_timeout     300s;
        grpc_read_timeout     300s;
        grpc_socket_keepalive on;
        grpc_next_upstream    off;
