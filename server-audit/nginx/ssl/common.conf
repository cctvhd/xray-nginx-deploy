# ===================================================
# /etc/nginx/ssl/common.conf
# ===================================================

# ========= TLS 版本 =========
ssl_protocols TLSv1.3 TLSv1.2;

# ========= TLS 1.3 密码套件（修复: CHACHA20 前置，对无 AES-NI 移动端更友好）=========
ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;

# ========= TLS 1.2 密码套件（修复: 替换 HIGH 关键字为精确 ECDHE 列表，消除无 PFS 套件）=========
ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

# 修复: 补回此指令，否则 TLS 1.2 套件排序完全由客户端决定
ssl_prefer_server_ciphers on;

# ========= ECDH 曲线（修复: 统一改用 ssl_conf_command 写法，与 Ciphersuites 一致）=========
ssl_conf_command Curves X25519:P-256:P-384;

# ========= 会话缓存（修复: 50m → 10m，≈4万会话，1C/2.2G 机器足够）=========
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# 禁止 0-RTT
ssl_early_data off;

# TLS 缓冲优化
ssl_buffer_size 4k;

# ========= 取消 OCSP（LE 已停服务）=========
ssl_stapling        off;
ssl_stapling_verify off;

# DNS 解析器
resolver 127.0.0.1:53 valid=300s ipv6=on;
resolver_timeout 5s;

# ========= 安全响应头 =========
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Content-Type-Options    "nosniff"                                       always;
add_header X-Frame-Options           "DENY"                                          always;
# 修复: X-XSS-Protection Chrome 78+ 已废弃移除，保留注释说明
# add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

# 修复: 防止代理响应被 CDN / 中间节点缓存
add_header Cache-Control "no-store, no-cache, must-revalidate" always;

# ========= CSP 已移至各伪装页 location 级别 =========
# 原全局 CSP 与全局 CORS 互相冲突，且代理 location 不需要 CSP（干扰流式传输头）
# CSP 仅在 servers.conf 各 /_fake / / location 内单独添加

# ========= CORS 已移至 xhttp location 级别 =========
# CORS 只有 xhttp CDN location 需要，全局设置会污染伪装页响应
# CORS 在 servers.conf 的 /98eb0d08b5574ea7b4a3f8e302064540 location 内单独添加