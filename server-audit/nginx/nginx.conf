# ============================================================
# /etc/nginx/nginx.conf
# CPU: 1C | MEM: 2.2G | PROFILE: small
# ============================================================
user nginx;
worker_processes 1;
worker_rlimit_nofile 8192;        # 修复: 200000 → 8192（≈ worker_connections × 2）
worker_cpu_affinity auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept       on;
    use                epoll;
    accept_mutex       off;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    include /etc/nginx/cloudflare_real_ip.conf;

    log_format main '$final_real_ip - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time ut="$upstream_response_time"';

    map $status $loggable {
        ~^4     0;
        default 1;
    }

    map $http_user_agent $bad_ua {
        ~*zgrab               1;
        ~*masscan             1;
        ~*python-requests     1;
        ~*Go-http-client      1;
        ~*InternetMeasurement 1;
        default               0;
    }

    map "${loggable}${bad_ua}" $do_log {
        "10"    1;
        default 0;
    }

    access_log /var/log/nginx/access.log main buffer=128k flush=10s if=$do_log;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout  75s;        # 修复: 1800s → 75s，xhttp/gRPC 长连接由 location 级 proxy_read_timeout 保活
    keepalive_requests 5000;

    client_max_body_size        0;
    client_body_timeout         60s;     # 修复: 7200s → 60s，防慢速攻击；xhttp location 级已显式覆盖 7200s
    client_header_timeout       300s;
    client_body_buffer_size     1m;
    client_header_buffer_size   8k;
    large_client_header_buffers 8 32k;
    send_timeout                7200s;

    server_tokens             off;
    reset_timedout_connection on;
    server_names_hash_bucket_size 128;
    server_names_hash_max_size    1024;
    types_hash_max_size           2048;

    lingering_time    60s;
    lingering_timeout 10s;

    proxy_buffering          off;
    proxy_request_buffering  off;
    proxy_max_temp_file_size 0;
    proxy_buffer_size        64k;
    proxy_buffers            8 64k;
    proxy_busy_buffers_size  128k;
    proxy_connect_timeout    15s;
    proxy_send_timeout       7200s;
    proxy_read_timeout       7200s;
    proxy_socket_keepalive   on;
    proxy_http_version       1.1;

    proxy_next_upstream         off;
    proxy_next_upstream_timeout 0;
    proxy_next_upstream_tries   0;

    open_file_cache          max=2000 inactive=120s;  # 修复: 20000 → 2000，代理机静态文件少，原值浪费内存
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    gzip off;

    # 修复: 原 2000/3000 r/s 对 1C 机器无防护意义，调低至实际有效范围
    # 按实际业务峰值流量进一步调整
    limit_req_zone  $final_real_ip zone=websocket:20m rate=200r/s;
    limit_req_zone  $final_real_ip zone=api:20m      rate=300r/s;
    limit_req_zone  $final_real_ip zone=health:1m    rate=10r/s;
    limit_conn_zone $final_real_ip zone=conn_limit:20m;

    include /etc/nginx/ssl/*.conf;
    include /etc/nginx/conf.d/*.conf;
}

# ============================================================
# Stream 块 - SNI 分流
# ============================================================
stream {
    log_format stream_basic '$remote_addr [$time_local] '
                             '$protocol $status $bytes_sent $bytes_received '
                             '$session_time "$ssl_preread_server_name"';

    map $ssl_preread_server_name $stream_loggable {
        ""      0;
        default 1;
    }

    access_log /var/log/nginx/stream.log stream_basic if=$stream_loggable;

    map $ssl_preread_server_name $backend {
        # -- Reality（自有域名 + 公共 serverNames）--------------------
        lax.shoes-bv.tk       127.0.0.1:9443;
        solanolibrary.com     127.0.0.1:9443;
        openclaw.ai           127.0.0.1:9443;
        www.lapl.org          127.0.0.1:9443;
        www.siliconvalley.com 127.0.0.1:9443;
        www.oxy.edu           127.0.0.1:9443;
        business.ca.gov       127.0.0.1:9443;
        film.ca.gov           127.0.0.1:9443;

        # -- xhttp CDN 回源 ------------------------------------------
        ca.ccpv.tk            127.0.0.1:20443;

        # -- gRPC CDN 回源 -------------------------------------------
        la.shoes-bv.tk        127.0.0.1:20445;

        # -- AnyTLS -> nginx 中间层 -> sing-box ----------------------
        la.ccpv.tk            127.0.0.1:18443;

        # -- SNI 陷阱兜底 --------------------------------------------
        default               127.0.0.1:20880;
    }

    server {
        listen 443 fastopen=256;
        listen [::]:443 fastopen=256;
        ssl_preread           on;
        proxy_pass            $backend;
        proxy_connect_timeout 10s;
        proxy_timeout         7200s;
        proxy_protocol        on;
    }

    # -- 中间层: 消费 proxy_protocol 后转发给 sing-box ---------------
    server {
        listen 127.0.0.1:18443 proxy_protocol;
        proxy_pass            127.0.0.1:8443;
        proxy_connect_timeout 10s;
        proxy_timeout         7200s;
    }
}